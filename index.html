<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dayli App Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar shell">
    <div class="brand-content">
      <div class="logo-wrapper"><i class="fas fa-layer-group logo-icon"></i></div>
      <div>
        <p class="eyebrow">Dayli Platform</p>
        <h1>App Hub</h1>
      </div>
    </div>
  </header>

  <main class="layout shell">
    <section class="card">
      <h2><i class="fas fa-compass"></i> Navigate Apps</h2>
      <p class="muted">Dayli is now the main page. Open individual apps from here.</p>
      <div class="metrics-grid">
        <a class="metric" href="./manifoldmanabot/">
          <p class="metric-label">Trading App</p>
          <p class="metric-value">ManifoldManaBot</p>
          <p class="muted">Open full bot console and analytics</p>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
